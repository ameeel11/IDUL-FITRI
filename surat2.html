<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Surat</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8bbd0;
      font-family: Arial, sans-serif;

    }

    .surat {
      width: 300px;
      height: 400px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      border-style: dashed;
      border-color: #a4e3cf;
      padding: 20px;
      padding-bottom: 50px;
    }

    .isi-surat {
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    h2.isi-surat {
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        background-color: #a4e3cf;
    }

    p.isi-surat {
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

    .thr {
        width: 150px;
        border-radius: 10px;
        display: block;
        margin: 0 auto;
    }
  </style>
</head>
<body>

<div class="surat">
    <h2 class="isi-surat"> SELAMAT HARI RAYA <BR> IDUL FITRI</h2>
        <p class="isi-surat"> Mohon maaf lahir dan batin.<br>Ini THR buat kalian :D <br> (samasama guys)</p>
        <img src="thr.jpeg" class="thr">
</div>


</body>
</html>
